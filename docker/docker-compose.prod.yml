# Production-style stack: Postgres + Redis + Node backend + nginx (static SPA).
# Same-origin: browser uses one URL; nginx proxies /api and /socket.io to the backend.
#
# Usage (from repo root):
#   cp .env.production.example .env.production
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d --build
#
# First-time DB: migrations run on backend startup. Then seed maps into Postgres:
#   ./scripts/seed-production.sh
#
# HTTP_PORT maps host port to nginx (default 80).

services:
  postgres:
    image: postgres:16-alpine
    container_name: borderfall_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronopass}
      POSTGRES_DB: ${POSTGRES_DB:-borderfall}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chronouser}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: borderfall_redis_prod
    restart: unless-stopped
    # AOF persistence (fsync every second) so a Redis crash loses ≤1s of writes
    # rather than everything since the last RDB snapshot — Redis holds live game
    # state. PRODUCTION: also set `--maxmemory <sized-to-host>` with
    # `--maxmemory-policy noeviction` (see the scale-out runbook). Do NOT use an
    # lru/random policy: it would evict live game-state keys and corrupt games.
    command: redis-server --requirepass ${REDIS_PASSWORD:-chronoredis} --appendonly yes --appendfsync everysec
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-chronoredis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: borderfall_backend_prod
    restart: unless-stopped
    # Give the in-app graceful drain (≤15s, then self-forces) time to flush
    # pending Postgres writes and close sockets before Compose sends SIGKILL.
    stop_grace_period: 30s
    # PRODUCTION: set mem_limit on every service (sized to the host) so a runaway
    # in one container can't OOM the co-located Postgres/Redis/nginx. Left unset
    # here because the right value is host-specific — see the scale-out runbook.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3001'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: ${POSTGRES_USER:-chronouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronopass}
      POSTGRES_DB: ${POSTGRES_DB:-borderfall}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD:-chronoredis}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_jwt_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_jwt_refresh}
      REFRESH_COOKIE_SAME_SITE: ${REFRESH_COOKIE_SAME_SITE:-lax}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Expose GET /metrics/json for internal scraping (active games, pg-pool
      # depth, event-loop lag, AI queue). Keep it proxy-internal — it's not
      # routed publicly in nginx.prod.conf. Override to 'false' to disable.
      METRICS_ENDPOINT_ENABLED: ${METRICS_ENDPOINT_ENABLED:-true}
      # Product-analytics funnel: persist to the analytics_events table + emit one
      # JSON log line per event. Default off — opt-in data collection. Read with
      # `pnpm exec tsx scripts/funnelReport.ts` inside this container.
      ANALYTICS_EVENTS_ENABLED: ${ANALYTICS_EVENTS_ENABLED:-false}
      # Watch/Spectate surface (Live nav, live-games list, spectator joins).
      # Default off at low player counts — an empty/stale live list reads worse
      # than none. Also flippable live via the spectate_enabled admin override.
      SPECTATE_ENABLED: ${SPECTATE_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@borderfall.com}
      INSTANCE_ID: ${INSTANCE_ID:-backend-1}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://127.0.0.1:3001/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL:-}
    container_name: borderfall_web_prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${HTTP_PORT:-80}:80'

  # Phase 9 — second backend instance (enable with nginx ip_hash + uncomment server line):
  # backend_2:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.backend
  #   container_name: borderfall_backend_prod_2
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     NODE_ENV: production
  #     PORT: '3001'
  #     POSTGRES_HOST: postgres
  #     POSTGRES_PORT: '5432'
  #     POSTGRES_USER: ${POSTGRES_USER:-chronouser}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronopass}
  #     POSTGRES_DB: ${POSTGRES_DB:-borderfall}
  #     REDIS_HOST: redis
  #     REDIS_PORT: '6379'
  #     REDIS_PASSWORD: ${REDIS_PASSWORD:-chronoredis}
  #     FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
  #     CORS_ORIGINS: ${CORS_ORIGINS:-}
  #     JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_jwt_access}
  #     JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_jwt_refresh}
  #     REFRESH_COOKIE_SAME_SITE: ${REFRESH_COOKIE_SAME_SITE:-lax}
  #     SENTRY_DSN: ${SENTRY_DSN:-}
  #     INSTANCE_ID: backend-2

volumes:
  postgres_prod_data:
  redis_prod_data:
