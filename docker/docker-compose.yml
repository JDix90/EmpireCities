services:
  postgres:
    image: postgres:16-alpine
    container_name: borderfall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronopass}
      POSTGRES_DB: ${POSTGRES_DB:-borderfall}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronouser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: borderfall_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-chronoredis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-chronoredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
