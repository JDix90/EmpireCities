# Same-origin deployment: browser talks to one HTTPS host; nginx forwards API + Socket.io to Node.
# For split domains (static on CDN, API elsewhere), build the frontend with VITE_API_URL / VITE_SOCKET_URL instead.
#
# Horizontal scaling (Phase 9): uncomment the second backend server and enable ip_hash so
# WebSocket clients stick to one Node instance for the life of their connection.

upstream borderfall_api {
    ip_hash;
    server backend:3001;
    # server backend_2:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /health {
        proxy_pass http://borderfall_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ready {
        proxy_pass http://borderfall_api/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://borderfall_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://borderfall_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Map Hub SPA (/maps) vs static regional JSON under /maps/regional/*.json
    # Without these, try_files hits the public/maps/ directory and returns 403.
    location = /maps {
        try_files /index.html =404;
    }
    location = /maps/ {
        try_files /index.html =404;
    }
    location ^~ /maps/ {
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
