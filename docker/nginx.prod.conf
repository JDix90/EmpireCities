# Same-origin deployment: browser talks to one HTTPS host; nginx forwards API + Socket.io to Node.
# For split domains (static on CDN, API elsewhere), build the frontend with VITE_API_URL / VITE_SOCKET_URL instead.
#
# Horizontal scaling (Phase 9): uncomment the second backend server and enable ip_hash so
# WebSocket clients stick to one Node instance for the life of their connection.

# Preserve the client's original scheme for backend-built absolute URLs (OG
# preview og:image / og:url). TLS is terminated in front of nginx, so the real
# scheme arrives via X-Forwarded-Proto; nginx's own $scheme is just http on :80.
# Default to https when the header is absent (production always sits behind TLS).
map $http_x_forwarded_proto $forwarded_proto_or_https {
    ""      https;
    default $http_x_forwarded_proto;
}

upstream borderfall_api {
    ip_hash;
    server backend:3001;
    # server backend_2:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /health {
        proxy_pass http://borderfall_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ready {
        proxy_pass http://borderfall_api/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://borderfall_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://borderfall_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Map Hub SPA (/maps) vs static regional JSON under /maps/regional/*.json
    # Without these, try_files hits the public/maps/ directory and returns 403.
    location = /maps {
        try_files /index.html =404;
    }
    location = /maps/ {
        try_files /index.html =404;
    }
    location ^~ /maps/ {
        try_files $uri /index.html;
    }

    # Replay links: serve the SPA to humans, but route social/chat crawler
    # user-agents to the backend HTML shell so link unfurls get per-replay
    # Open Graph tags + a dynamic preview image. `if` + `proxy_pass` is one of
    # the documented-safe uses of `if` in location context.
    location ~ ^/replay/[^/]+$ {
        # Header directives live in the location so they're inherited by the
        # implicit `if` location below. The backend builds og:image / og:url
        # from these, so Host + the *original* X-Forwarded-Proto must survive
        # (don't overwrite proto with $scheme — TLS is terminated upstream and
        # nginx itself only sees http on :80). Fall back to https when absent.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto_or_https;
        if ($http_user_agent ~* "(facebookexternalhit|Twitterbot|Slackbot|Discordbot|LinkedInBot|WhatsApp|TelegramBot|Embedly|Pinterest|redditbot|Googlebot|bingbot|Applebot|vkShare|SkypeUriPreview|Bitrix|nuzzel|Slack-ImgProxy|flipboard|tumblr|bitlybot|mattermost|Iframely)") {
            proxy_pass http://borderfall_api;
        }
        try_files /index.html =404;
    }

    # PWA manifest: nginx's stock mime.types has no .webmanifest mapping, and
    # a text/plain manifest breaks installability checks in some browsers.
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
