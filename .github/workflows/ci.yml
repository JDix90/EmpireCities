name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm -C packages/shared run build

      - name: Backend type-check
        run: pnpm -C backend exec tsc --noEmit

      - name: Backend tests
        run: pnpm run test:backend
        env:
          REDIS_TEST: '1'
          REDIS_HOST: localhost
          REDIS_PASSWORD: ''
        services:
          redis:
            image: redis:7-alpine
            ports:
              - 6379:6379
            options: >-
              --health-cmd "redis-cli ping"
              --health-interval 10s
              --health-timeout 5s
              --health-retries 5

      - name: Validate maps
        run: pnpm run validate:maps

      - name: ESLint (backend)
        run: pnpm run lint

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm -C packages/shared run build

      - name: Frontend type-check
        run: pnpm -C frontend exec tsc --noEmit

      - name: Frontend unit tests
        run: pnpm run test:frontend

      - name: Frontend build
        run: pnpm -C frontend run build

      - name: Install Playwright (Chromium)
        run: pnpm -C frontend exec playwright install chromium --with-deps

      - name: E2E smoke (Chromium)
        env:
          CI: true
        run: pnpm run test:e2e:smoke

      - name: E2E map visual smokes (Chromium)
        env:
          CI: true
        run: pnpm run test:e2e:map-visual
